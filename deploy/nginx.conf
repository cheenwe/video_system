# lab_system 反向代理示例（大文件上传 / 视频 Range 播放）
# 将下方 upstream 与 server_name 按实际环境修改后，include 到 Nginx 站点配置。

upstream lab_system_app {
    server 127.0.0.1:8808;
    keepalive 32;
}

server {
    listen 80;
    server_name lab.example.com;

    # 与 .env VIDEO_MAX_UPLOAD_MB 对齐（默认 5120MB）
    client_max_body_size 5120m;
    client_body_timeout 3600s;

    location / {
        proxy_pass http://lab_system_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # 视频断点续传 / 分片上传
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
